<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title data-i18n="archive-title">封存任務</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="taskmanager.css">
  <style>
    .archive-container {
      padding: 20px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    }
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
      padding-bottom: 10px;
    }
    .search-box {
      flex: 1;
      margin-right: 20px;
    }
    .delete-perm-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      transition: color 0.2s;
    }
    .delete-perm-btn:hover {
      color: #ff4d4d;
    }
  </style>
</head>
<body class="archive-container">
  <div class="header-row">
    <div class="filters" style="display: flex; gap: 4px;">
      <button class="tab active" data-filter="all" data-i18n="filter-all">全部</button>
      <button class="tab" data-filter="day" data-i18n="tab-day">日</button>
      <button class="tab" data-filter="week" data-i18n="tab-week">週</button>
      <button class="tab" data-filter="month" data-i18n="tab-month">月</button>
    </div>
    <div class="search-box" style="display: flex; gap: 10px; align-items: center; flex: 0 0 250px;">
      <button id="undo-btn" class="icon-action-btn" disabled title="復原刪除 / Undo Delete" style="padding: 4px 10px; display: flex; align-items: center;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 2v6h6"></path>
          <path d="M3 13a9 9 0 1 0 3-7.7L3 8"></path>
        </svg>
      </button>
      <div style="position: relative; flex: 1; display: flex; align-items: center;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="position: absolute; left: 12px; color: var(--text-secondary); pointer-events: none;">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="search-input" data-i18n="search-placeholder" placeholder="搜尋封存任務..." autocomplete="off" style="width: 100%; padding: 10px 16px 10px 34px; border-radius: 16px; border: 1px solid var(--border); background: var(--item-bg); color: var(--text-primary); font-size: 13px; outline: none;">
      </div>
    </div>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th data-sort="completed" data-i18n="col-status" style="width: 80px;">狀態</th>
          <th data-sort="text" data-i18n="col-text" style="width: 40%;">任務內容</th>
          <th data-sort="dimension" data-i18n="col-dim">維度</th>
          <th data-sort="createdAt" data-i18n="col-created" style="width: 150px;">建立時間</th>
          <th data-sort="dueDate" data-i18n="col-due" style="width: 150px;">到期時間</th>
          <th style="width: 70px;"></th>
        </tr>
      </thead>
      <tbody id="archive-tbody"></tbody>
    </table>
  </div>

  <script src="locales.js"></script>
  <script src="archive.js"></script>
</body>
</html>
