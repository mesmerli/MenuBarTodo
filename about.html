<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title data-i18n="about-title">關於 MenuBar Todo</title>
  <style>
    :root {
      --bg-color: #19191c;
      --text-primary: #f0f0f0;
      --text-secondary: #8c8c93;
      --accent: #5e6ad2;
      --border: rgba(255, 255, 255, 0.1);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-primary);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      -webkit-app-region: drag;
    }
    .container {
      padding: 20px;
    }
    img {
      width: 64px;
      height: 64px;
      margin-bottom: 16px;
      filter: drop-shadow(0 0 10px var(--accent));
    }
    h1 {
      font-size: 18px;
      margin: 0 0 8px 0;
    }
    p {
      font-size: 13px;
      color: var(--text-secondary);
      margin: 4px 0;
    }
    .version-tag {
      background: rgba(94, 106, 210, 0.1);
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      margin-top: 8px;
      display: inline-block;
    }
    button {
      margin-top: 24px;
      background: var(--accent);
      color: white;
      border: none;
      padding: 8px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
      -webkit-app-region: no-drag;
    }
    button:hover {
      filter: brightness(1.1);
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="icon.png" alt="App Icon">
    <h1 data-i18n="about-title">MenuBar Todo</h1>
    <p data-i18n="about-desc">極簡、極速的選單列待辦清單</p>
    <div>
      <span class="version-tag"><span data-i18n="about-version">版本</span> v<span id="version-num">1.0.0</span></span>
    </div>
    <p style="margin-top: 12px;"><span data-i18n="about-author">作者</span>: mesmerli</p>
    <button onclick="window.close()" data-i18n="btn-close">關閉</button>
  </div>

  <script src="locales.js"></script>
  <script>
    async function init() {
      const config = await window.api.loadConfig();
      window.i18n.lang = config.lang || 'zh-TW';
      window.i18n.applyTranslations();
      
      // Get version from app (via main if needed, but for now we can hardcode or get via API)
      // For simplicity, let's assume we might want to update this dynamically
    }
    init();
    
    window.api.onLanguageChanged((lang) => {
      window.i18n.lang = lang;
      window.i18n.applyTranslations();
    });
  </script>
</body>
</html>
